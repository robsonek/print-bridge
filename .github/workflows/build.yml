name: build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
      - name: Install poppler (for renderer tests)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - run: go vet ./...
      - run: go test ./...
      - run: CGO_ENABLED=0 go build ./cmd/print-bridge

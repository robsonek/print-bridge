name: build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
      - name: Install poppler (for renderer tests)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - run: go vet ./...
      - run: go test ./...
      # Same ldflags shape as release.yml: a regression in the -X package path
      # (e.g. after a rename) must surface here, not at release time.
      - name: Build with version injection
        run: |
          VERSION="$(git describe --tags --always)"
          CGO_ENABLED=0 go build -ldflags "-X github.com/robsonek/print-bridge/internal/version.Version=${VERSION}" ./cmd/print-bridge

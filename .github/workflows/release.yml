name: release
on:
  push:
    tags: ['v*']
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
      - name: Build
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} \
            go build -ldflags "-X github.com/robsonek/print-bridge/internal/version.Version=${VERSION}" \
            -o print-bridge ./cmd/print-bridge
          TARBALL="print-bridge-${VERSION}-linux-${{ matrix.arch }}.tar.gz"
          cp deploy/print-bridge.service deploy/install-debian.sh deploy/update-bridge.sh deploy/config.json.template .
          tar -czf "$TARBALL" print-bridge print-bridge.service install-debian.sh update-bridge.sh config.json.template
          sha256sum "$TARBALL" > "$TARBALL.sha256"
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            print-bridge-*.tar.gz
            print-bridge-*.tar.gz.sha256
          generate_release_notes: true
